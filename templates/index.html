<!DOCTYPE html>
<html>
<head>
    <title>Network Anomaly Detector</title>
</head>
<body>
    <h2>Network Anomaly Detector</h2>

    <form method="POST">
        <label>Packet Size:</label><br>
        <input type="number" name="packet_size" required><br><br>

        <label>Duration:</label><br>
        <input type="number" step="0.01" name="duration" required><br><br>

        <label>Protocol (0, 1, 2):</label><br>
        <input type="number" name="protocol" min="0" max="2" required><br><br>

        <button type="submit">Check</button>
    </form>

    {% if prediction %}
        <h3>{{ prediction }}</h3>
    {% endif %}
</body>
</html>
